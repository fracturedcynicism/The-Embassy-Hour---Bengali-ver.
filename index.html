<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>কাবুলের শেষ রাত</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500&family=Hind+Siliguri:wght@300;400;500;600&family=Share+Tech+Mono&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f2ead8;
    --ink: #1a1410;
    --blood: #8b1a1a;
    --brass: #b8902a;
    --shadow: #2d2416;
    --dim: #6b5a3e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0b08;
    font-family: 'Hind Siliguri', sans-serif;
    color: var(--paper);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* TITLE SCREEN */
  #title-screen {
    position: fixed; inset: 0;
    background: #0d0b08;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    transition: opacity 1.2s ease;
  }

  #title-screen.fade-out { opacity: 0; pointer-events: none; }

  .title-bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 40%, rgba(184,144,42,0.08) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.005) 2px, rgba(255,255,255,0.005) 4px);
  }

  .title-emblem {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--brass);
    opacity: 0.5;
    letter-spacing: 0.3em;
    margin-bottom: 40px;
    animation: flicker 4s infinite;
  }

  @keyframes flicker {
    0%, 95%, 100% { opacity: 0.5; }
    96% { opacity: 0.2; }
    97% { opacity: 0.6; }
    98% { opacity: 0.15; }
    99% { opacity: 0.5; }
  }

  .title-main {
    font-family: 'Hind Siliguri', sans-serif;
    font-size: clamp(38px, 8vw, 84px);
    font-weight: 600;
    color: var(--paper);
    text-align: center;
    line-height: 1.0;
    text-shadow: 0 0 60px rgba(184,144,42,0.3);
    animation: titleReveal 2s ease forwards;
    opacity: 0;
  }

  @keyframes titleReveal {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .title-sub {
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 17px;
    color: var(--brass);
    margin-top: 16px;
    animation: titleReveal 2s 0.5s ease forwards;
    opacity: 0;
  }

  .title-author {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.3em;
    margin-top: 40px;
    animation: titleReveal 2s 1s ease forwards;
    opacity: 0;
  }

  .title-divider {
    width: 200px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--brass), transparent);
    margin: 36px auto;
    animation: titleReveal 2s 1.2s ease forwards;
    opacity: 0;
  }

  .title-context {
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 15px;
    color: var(--dim);
    text-align: center;
    max-width: 420px;
    line-height: 1.8;
    animation: titleReveal 2s 1.5s ease forwards;
    opacity: 0;
  }

  .start-btn {
    margin-top: 60px;
    padding: 14px 48px;
    background: transparent;
    border: 1px solid var(--brass);
    color: var(--brass);
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 14px;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.3s;
    animation: titleReveal 2s 2s ease forwards;
    opacity: 0;
    position: relative;
    overflow: hidden;
  }

  .start-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--brass);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
    z-index: -1;
  }

  .start-btn:hover::before { transform: scaleX(1); }
  .start-btn:hover { color: #0d0b08; }

  /* MAIN READER */
  #reader { display: none; min-height: 100vh; }
  #reader.visible { display: flex; }

  /* SIDEBAR */
  #sidebar {
    width: 280px;
    min-height: 100vh;
    background: #0d0b08;
    border-right: 1px solid rgba(184,144,42,0.2);
    position: fixed;
    left: 0; top: 0; bottom: 0;
    overflow-y: auto;
    z-index: 50;
    transform: translateX(-100%);
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    padding: 32px 0;
  }

  #sidebar.open { transform: translateX(0); }

  .sidebar-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--brass);
    letter-spacing: 0.4em;
    padding: 0 24px 24px;
    border-bottom: 1px solid rgba(184,144,42,0.15);
    margin-bottom: 16px;
  }

  .chapter-nav-item {
    display: block;
    padding: 12px 24px;
    color: var(--dim);
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    border-left: 2px solid transparent;
    line-height: 1.4;
  }

  .chapter-nav-item:hover {
    color: var(--paper);
    border-left-color: var(--brass);
    background: rgba(184,144,42,0.05);
    padding-left: 28px;
  }

  .chapter-nav-item.active {
    color: var(--brass);
    border-left-color: var(--brass);
    background: rgba(184,144,42,0.08);
  }

  .chapter-num {
    display: block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--dim);
    margin-bottom: 3px;
  }

  /* TOP BAR */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 56px;
    background: rgba(13,11,8,0.95);
    border-bottom: 1px solid rgba(184,144,42,0.15);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    z-index: 40;
    backdrop-filter: blur(8px);
  }

  #menu-btn {
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 4px;
  }

  #menu-btn span {
    display: block;
    width: 22px; height: 1px;
    background: var(--brass);
    transition: all 0.3s;
  }

  #menu-btn.open span:nth-child(1) { transform: rotate(45deg) translate(4px, 4px); }
  #menu-btn.open span:nth-child(2) { opacity: 0; }
  #menu-btn.open span:nth-child(3) { transform: rotate(-45deg) translate(4px, -4px); }

  .topbar-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.3em;
  }

  .topbar-chapter {
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 14px;
    color: var(--brass);
  }

  #progress-bar {
    position: fixed;
    top: 56px; left: 0; right: 0;
    height: 2px;
    background: rgba(184,144,42,0.1);
    z-index: 40;
  }

  #progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--brass), #e8b84b);
    width: 0%;
    transition: width 0.3s ease;
  }

  /* CONTENT */
  #content-area {
    margin-top: 58px;
    min-height: calc(100vh - 58px);
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .chapter-page {
    display: none;
    width: 100%;
    max-width: 740px;
    padding: 60px 40px 120px;
    animation: pageReveal 0.6s ease forwards;
  }

  .chapter-page.active { display: block; }

  @keyframes pageReveal {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .chapter-header {
    margin-bottom: 48px;
    padding-bottom: 32px;
    border-bottom: 1px solid rgba(184,144,42,0.2);
  }

  .ch-number {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--brass);
    letter-spacing: 0.4em;
    display: block;
    margin-bottom: 12px;
  }

  .ch-title {
    font-family: 'Hind Siliguri', sans-serif;
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 600;
    color: var(--paper);
    line-height: 1.2;
  }

  .chapter-body p {
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 18px;
    font-weight: 300;
    line-height: 2.0;
    color: #d4c9b0;
    margin-bottom: 26px;
    text-align: justify;
  }

  .chapter-body p.dialogue {
    padding-left: 20px;
    border-left: 2px solid rgba(184,144,42,0.3);
    font-style: normal;
  }

  .kabul-clock {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    padding: 6px 12px;
    border: 1px solid rgba(184,144,42,0.15);
    margin-bottom: 12px;
  }

  .clock-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--blood);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* NOTE CARD */
  .note-card {
    background: rgba(184,144,42,0.05);
    border: 1px solid rgba(184,144,42,0.2);
    border-left: 3px solid var(--brass);
    padding: 20px 24px;
    margin: 32px 0;
    position: relative;
  }

  .note-card::before {
    content: '// প্রণিধির নোট';
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--brass);
    letter-spacing: 0.2em;
    display: block;
    margin-bottom: 14px;
    opacity: 0.7;
  }

  .note-card p {
    font-family: 'Hind Siliguri', sans-serif !important;
    font-size: 14px !important;
    font-weight: 400 !important;
    color: var(--dim) !important;
    line-height: 1.8 !important;
    margin-bottom: 8px !important;
    text-align: left !important;
  }

  /* SUSPECT DOSSIER */
  .suspect-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 16px;
    margin: 32px 0;
  }

  .suspect-card {
    background: #0d0b08;
    border: 1px solid rgba(184,144,42,0.15);
    padding: 20px;
    position: relative;
    transition: border-color 0.2s;
  }

  .suspect-card:hover { border-color: rgba(184,144,42,0.4); }
  .suspect-card.arrested { border-color: var(--blood); }

  .suspect-card.arrested::after {
    content: 'গ্রেপ্তার';
    position: absolute; top: 8px; right: 8px;
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 9px;
    color: var(--blood);
    border: 1px solid var(--blood);
    padding: 2px 6px;
  }

  .suspect-name {
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--paper);
    margin-bottom: 4px;
  }

  .suspect-role {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    color: var(--brass);
    letter-spacing: 0.2em;
    margin-bottom: 10px;
  }

  .suspect-detail {
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 12px;
    color: var(--dim);
    line-height: 1.6;
  }

  /* BOTTOM NAV */
  #bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 72px;
    background: rgba(13,11,8,0.97);
    border-top: 1px solid rgba(184,144,42,0.15);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    z-index: 40;
  }

  .nav-btn {
    background: none;
    border: 1px solid rgba(184,144,42,0.3);
    color: var(--dim);
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 13px;
    padding: 10px 24px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .nav-btn:hover:not(:disabled) { border-color: var(--brass); color: var(--brass); }
  .nav-btn:disabled { opacity: 0.2; cursor: not-allowed; }

  .chapter-counter {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    text-align: center;
  }

  .chapter-counter span {
    color: var(--brass);
    font-size: 18px;
    display: block;
    margin-bottom: 2px;
  }

  #overlay {
    display: none;
    position: fixed; inset: 0;
    z-index: 45;
    background: rgba(0,0,0,0.5);
  }
  #overlay.visible { display: block; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0d0b08; }
  ::-webkit-scrollbar-thumb { background: rgba(184,144,42,0.3); }

  #content-area::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.03) 3px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 200;
  }

  @media (max-width: 600px) {
    .chapter-page { padding: 40px 20px 100px; }
    .chapter-body p { font-size: 16px; }
  }
</style>
</head>
<body>

<!-- TITLE SCREEN -->
<div id="title-screen">
  <div class="title-bg"></div>
  <div class="title-emblem">কাবুল · আগস্ট ২০২১ · গোপনীয়</div>
  <h1 class="title-main">কাবুলের শেষ রাত</h1>
  <div class="title-sub">একটি গোয়েন্দা উপন্যাস</div>
  <div class="title-author">BY FRACTURED CYNICISM</div>
  <div class="title-divider"></div>
  <p class="title-context">একজন নিখোঁজ সাংবাদিক। একটি দূতাবাস। একটি শহরের হাতে বাকি মাত্র আটচল্লিশ ঘণ্টা।</p>
  <button class="start-btn" onclick="startReading()">পড়া শুরু করুন</button>
</div>

<div id="sidebar">
  <div class="sidebar-title">অধ্যায়সমূহ</div>
  <div id="chapter-list"></div>
</div>
<div id="overlay" onclick="toggleSidebar()"></div>

<div id="reader">
  <div id="topbar">
    <button id="menu-btn" onclick="toggleSidebar()">
      <span></span><span></span><span></span>
    </button>
    <div class="topbar-title">কাবুলের শেষ রাত</div>
    <div class="topbar-chapter" id="topbar-chapter-label">অধ্যায় ১</div>
  </div>
  <div id="progress-bar"><div id="progress-fill"></div></div>

  <div id="content-area"></div>

  <div id="bottom-nav">
    <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">← আগে</button>
    <div class="chapter-counter">
      <span id="ch-current">1</span>
      <div>/ ১২</div>
    </div>
    <button class="nav-btn" id="next-btn" onclick="navigate(1)">পরে →</button>
  </div>
</div>

<script>
const chapters = [
  {
    num: 1,
    title: "মেরিগোল্ড",
    time: "০২:৪৭ · কাবুল",
    body: [
      "ফোনটা এল রাত দুটো সাতচল্লিশে।",
      "কাবুল তখন চুপ। তবে সে চুপ নয় যেটায় মন শান্ত হয় — এ হল সেই নিস্তব্ধতা যার ভেতরে কিছু একটা লুকিয়ে থাকে। শেষ আমেরিকান কনভয় হাইওয়ে ওয়ান ধরে দক্ষিণে মিলিয়ে গিয়েছে তিন দিন আগে — আর ফেরেনি। চেকপোস্টগুলো ফাঁকা। আফগান সেনাবাহিনী পিছু হটছিল না, আত্মসমর্পণও করছিল না। শুধু গলে যাচ্ছিল। জলে লবণের মতো — যেন কখনো শক্ত ছিলই না।",
      "অন্ধকারে ফোনের দিকে হাত বাড়ালেন ডিটেকটিভ উত্তম প্রণিধি।",
      "বাইরে, শহরের কোথাও, একটা কুকুর ডেকে থামল। আর কিছু সাড়া দিল না।",
      "ওপাশের মহিলা পাশতো আর পাঞ্জাবি মিশিয়ে বলছিলেন — যেভাবে মানুষ কথা বলে যখন কান্না আটকে রাখার শেষ চেষ্টা চলছে, আর শোকের ভাষা বারবার পালটে যাচ্ছে নিজেই।",
      "\"আমার স্বামী এই নম্বরটা দিয়েছিল। বলেছিল মধ্যরাতের মধ্যে ফোন না করলে আমি যেন করি।\"",
      "মধ্যরাত পেরিয়ে গেছে বহুক্ষণ। মহিলার নাম প্রীতিন্দর কৌর। তাঁর স্বামী তারিক সিদ্দিকি — ফটোসাংবাদিক — দুপুরে পাকিস্তানি দূতাবাসে ঢুকেছিলেন পাসপোর্ট জমা দিতে। শিখ-আফগান দম্পতির বিয়ের নথিপত্রের ব্যাপার। ফেরেননি।",
      "\"সে কোন শব্দটা বলার কথা ছিল?\" প্রণিধি জিজ্ঞেস করলেন। \"নিরাপদ পৌঁছালে।\"",
      "এক মুহূর্ত থামলেন মহিলা। \"মেরিগোল্ড।\"",
      "সেই শব্দ আসেনি। যেটা নিজেই একটা উত্তর।",
      "\"আমি তাঁকে খুঁজে বের করব।\" প্রণিধি বললেন। নিজেও প্রায় বিশ্বাস করলেন।",
      "ততক্ষণে তিনি জ্যাকেট গায়ে দিচ্ছিলেন।"
    ]
  },
  {
    num: 2,
    title: "যুদ্ধের থালা",
    time: "ভোরবেলা · কাবুল পতনের মুখে",
    body: [
      "জালালাবাদ পড়ল সকালের নাস্তার আগেই। একটি গুলিও ছোড়া হয়নি। তালিবানের এখন আর বুলেটের দরকার নেই — আমেরিকা সেই কাজ করে দিয়ে গেছে। রাতের অন্ধকারে বাগরাম গুটিয়ে পালিয়েছে যেন ভাড়াটে ভাড়া না মিটিয়ে চম্পট দিয়েছে, মাদুরের নিচে চাবি রেখে — যে আগে আসবে তার জন্য।",
      "কাবুলের পালা পরের। সকলেই জানে। কেউ বলে না।",

      "বাইরে পতাকাগুলো দশ মিনিট আগের চেয়ে কাছে। রাস্তায় রাস্তায়, ব্লকে ব্লকে এগিয়ে আসছে — সেই স্থির গতিতে যেটা অনেকদিন অপেক্ষায় থাকার পর আসে, যে আর তাড়া করে না কারণ সে জিতে গেছে।",
      "ফোনে দুটো মিসড কল অচেনা নম্বর থেকে।",
      "ধরল না।",
      "পেছন থেকে নাদিয়া বললেন: \"এরপর কী হবে?\"",
      "তারও কোনো উত্তর ছিল না।",
      "উত্তরে তাকিয়ে রইল সে। হেলিকপ্টারের শব্দের অপেক্ষায়। কোন ধরনটা আগে আসবে — এখনও নিশ্চিত নয়…।"
    ]
  }
];

let currentChapter = 0;



function startReading() {
  const ts = document.getElementById('title-screen');
  ts.classList.add('fade-out');
  setTimeout(() => {
    ts.style.display = 'none';
    document.getElementById('reader').style.display = 'flex';
    buildChapters();
    buildSidebar();
    showChapter(0);
  }, 1200);
}

function buildChapters() {
  const area = document.getElementById('content-area');
  chapters.forEach((ch, i) => {
    const div = document.createElement('div');
    div.className = 'chapter-page' + (i === 0 ? ' active' : '');
    div.id = `ch-${i}`;

    const bodyHTML = ch.body.map(p => `<p>${p}</p>`).join('');

    let noteHTML = '';
    if (ch.note && ch.noteContent) {
      noteHTML = `<div class="note-card">${ch.noteContent.map(n => `<p>${n}</p>`).join('')}</div>`;
    }

    let suspectsHTML = '';
    if (ch.suspects) {
      suspectsHTML = `
        <div style="margin:40px 0 0;border-top:1px solid rgba(184,144,42,0.2);padding-top:32px;">
          <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--brass);letter-spacing:0.3em;margin-bottom:20px;">মামলার সমাপ্তি · মূল ব্যক্তিবর্গ</div>
          <div class="suspect-grid">
            ${ch.suspects.map(s => `
              <div class="suspect-card ${s.status === 'arrested' ? 'arrested' : ''}">
                <div class="suspect-name">${s.name}</div>
                <div class="suspect-role">${s.role}</div>
                <div class="suspect-detail">${s.detail}</div>
              </div>
            `).join('')}
          </div>
        </div>`;
    }

    div.innerHTML = `
      <div class="chapter-header">
        <div class="kabul-clock"><div class="clock-dot"></div>${ch.time}</div>
        <span class="ch-number">অধ্যায় ${String(ch.num).padStart(2,'0')}</span>
        <h2 class="ch-title">${ch.title}</h2>
      </div>
      <div class="chapter-body">${bodyHTML}${noteHTML}${suspectsHTML}</div>`;

    area.appendChild(div);
  });
}

function buildSidebar() {
  const list = document.getElementById('chapter-list');
  chapters.forEach((ch, i) => {
    const item = document.createElement('div');
    item.className = 'chapter-nav-item' + (i === 0 ? ' active' : '');
    item.id = `nav-${i}`;
    item.innerHTML = `<span class="chapter-num">অধ্যায় ${String(ch.num).padStart(2,'0')}</span>${ch.title}`;
    item.onclick = () => { showChapter(i); toggleSidebar(); };
    list.appendChild(item);
  });
}

function showChapter(idx) {
  document.querySelectorAll('.chapter-page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.chapter-nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(`ch-${idx}`).classList.add('active');
  document.getElementById(`nav-${idx}`).classList.add('active');
  window.scrollTo(0, 0);
  currentChapter = idx;
  document.getElementById('topbar-chapter-label').textContent = chapters[idx].title;
  document.getElementById('ch-current').textContent = idx + 1;
  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-btn').disabled = idx === chapters.length - 1;
  document.getElementById('progress-fill').style.width = ((idx + 1) / chapters.length * 100) + '%';
}

function navigate(dir) {
  const next = currentChapter + dir;
  if (next >= 0 && next < chapters.length) showChapter(next);
}

let sidebarOpen = false;
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('open', sidebarOpen);
  document.getElementById('overlay').classList.toggle('visible', sidebarOpen);
  document.getElementById('menu-btn').classList.toggle('open', sidebarOpen);
}
</script>
</body>
</html>
