<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>দূতাবাসের এক ঘণ্টা</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600&family=Noto+Serif+Bengali:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f2ead8;
    --ink: #1a1410;
    --blood: #8b1a1a;
    --brass: #b8902a;
    --shadow: #2d2416;
    --dim: #6b5a3e;
    --scan: rgba(0,0,0,0.04);
    --gold-glow: rgba(184,144,42,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0b08;
    font-family: 'Hind Siliguri', sans-serif;
    color: var(--paper);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── TITLE SCREEN ──────────────────────────────────────────── */
  #title-screen {
    position: fixed; inset: 0;
    background: #0d0b08;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    transition: opacity 1.4s ease;
  }
  #title-screen.fade-out { opacity: 0; pointer-events: none; }

  .title-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 50% 38%, rgba(184,144,42,0.09) 0%, transparent 62%),
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.004) 2px, rgba(255,255,255,0.004) 4px);
  }

  /* floating dust particles */
  .title-bg::after {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(184,144,42,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 70%, rgba(184,144,42,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 20%, rgba(184,144,42,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 80%, rgba(184,144,42,0.25) 0%, transparent 100%);
    animation: dustDrift 12s ease-in-out infinite alternate;
    opacity: 0.6;
  }

  @keyframes dustDrift {
    from { transform: translateY(0px); }
    to   { transform: translateY(-8px); }
  }

  .title-emblem {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--brass);
    opacity: 0.5;
    letter-spacing: 0.35em;
    margin-bottom: 36px;
    animation: flicker 5s infinite, titleReveal 1.5s ease forwards;
    opacity: 0;
  }

  @keyframes flicker {
    0%, 94%, 100% { opacity: 0.5; }
    95% { opacity: 0.15; }
    97% { opacity: 0.6; }
    99% { opacity: 0.2; }
  }

  .title-main {
    font-family: 'Noto Serif Bengali', serif;
    font-size: clamp(38px, 7.5vw, 88px);
    font-weight: 700;
    color: var(--paper);
    text-align: center;
    letter-spacing: 0.01em;
    line-height: 1.1;
    text-shadow: 0 0 80px rgba(184,144,42,0.35);
    animation: titleReveal 2s 0.2s ease forwards;
    opacity: 0;
  }

  .title-en {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--dim);
    text-align: center;
    letter-spacing: 0.25em;
    margin-top: 10px;
    animation: titleReveal 2s 0.7s ease forwards;
    opacity: 0;
  }

  @keyframes titleReveal {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .title-sub {
    font-family: 'Tiro Bangla', serif;
    font-style: italic;
    font-size: 17px;
    color: var(--brass);
    margin-top: 14px;
    animation: titleReveal 2s 1s ease forwards;
    opacity: 0;
  }

  .title-author {
    font-family: 'Noto Serif Bengali', serif;
    font-size: 13px;
    color: var(--dim);
    letter-spacing: 0.15em;
    margin-top: 36px;
    animation: titleReveal 2s 1.3s ease forwards;
    opacity: 0;
  }

  .title-divider {
    width: 220px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--brass), transparent);
    margin: 32px auto;
    animation: titleReveal 2s 1.5s ease forwards;
    opacity: 0;
  }

  .title-context {
    font-family: 'Tiro Bangla', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--dim);
    text-align: center;
    max-width: 440px;
    line-height: 1.9;
    animation: titleReveal 2s 1.8s ease forwards;
    opacity: 0;
  }

  .start-btn {
    margin-top: 52px;
    padding: 14px 52px;
    background: transparent;
    border: 1px solid var(--brass);
    color: var(--brass);
    font-family: 'Noto Serif Bengali', serif;
    font-size: 14px;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.35s;
    animation: titleReveal 2s 2.1s ease forwards;
    opacity: 0;
    position: relative;
    overflow: hidden;
  }
  .start-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--brass);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.35s ease;
    z-index: -1;
  }
  .start-btn:hover::before { transform: scaleX(1); }
  .start-btn:hover { color: #0d0b08; }

  /* ─── SIDEBAR ───────────────────────────────────────────────── */
  #sidebar {
    width: 290px;
    min-height: 100vh;
    background: #0d0b08;
    border-right: 1px solid rgba(184,144,42,0.2);
    position: fixed; left: 0; top: 0; bottom: 0;
    overflow-y: auto; z-index: 50;
    transform: translateX(-100%);
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    padding: 32px 0;
  }
  #sidebar.open { transform: translateX(0); }

  .sidebar-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--brass);
    letter-spacing: 0.4em;
    padding: 0 24px 24px;
    border-bottom: 1px solid rgba(184,144,42,0.15);
    margin-bottom: 16px;
  }

  .chapter-nav-item {
    display: block;
    padding: 12px 24px;
    color: var(--dim);
    font-family: 'Noto Serif Bengali', serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    border-left: 2px solid transparent;
    line-height: 1.5;
  }
  .chapter-nav-item:hover {
    color: var(--paper);
    border-left-color: var(--brass);
    background: rgba(184,144,42,0.05);
    padding-left: 28px;
  }
  .chapter-nav-item.active {
    color: var(--brass);
    border-left-color: var(--brass);
    background: rgba(184,144,42,0.08);
  }
  .chapter-num {
    display: block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--dim);
    margin-bottom: 3px;
  }

  /* ─── TOPBAR ────────────────────────────────────────────────── */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0;
    height: 56px;
    background: rgba(13,11,8,0.96);
    border-bottom: 1px solid rgba(184,144,42,0.15);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; z-index: 40;
    backdrop-filter: blur(10px);
  }

  #menu-btn {
    background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; gap: 5px; padding: 4px;
  }
  #menu-btn span {
    display: block; width: 22px; height: 1px;
    background: var(--brass); transition: all 0.3s;
  }
  #menu-btn.open span:nth-child(1) { transform: rotate(45deg) translate(4px,4px); }
  #menu-btn.open span:nth-child(2) { opacity: 0; }
  #menu-btn.open span:nth-child(3) { transform: rotate(-45deg) translate(4px,-4px); }

  .topbar-title {
    font-family: 'Noto Serif Bengali', serif;
    font-size: 12px; color: var(--dim); letter-spacing: 0.1em;
  }
  .topbar-chapter {
    font-family: 'Tiro Bangla', serif;
    font-size: 13px; color: var(--brass); font-style: italic;
  }

  /* ─── PROGRESS ──────────────────────────────────────────────── */
  #progress-bar {
    position: fixed; top: 56px; left: 0; right: 0;
    height: 2px; background: rgba(184,144,42,0.1); z-index: 40;
  }
  #progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--brass), #e8b84b);
    width: 0%; transition: width 0.3s ease;
  }

  /* ─── MAIN CONTENT ──────────────────────────────────────────── */
  #content-area {
    margin-top: 58px; min-height: calc(100vh - 58px);
    display: flex; flex-direction: column; align-items: center; width: 100%;
  }

  .chapter-page {
    display: none; width: 100%; max-width: 740px;
    padding: 60px 40px 130px;
    animation: pageReveal 0.6s ease forwards;
  }
  .chapter-page.active { display: block; }

  @keyframes pageReveal {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── CHAPTER HEADER ────────────────────────────────────────── */
  .chapter-header {
    margin-bottom: 52px;
    padding-bottom: 32px;
    border-bottom: 1px solid rgba(184,144,42,0.2);
  }
  .kabul-clock {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'Share Tech Mono', monospace; font-size: 10px;
    color: var(--dim); padding: 6px 12px;
    border: 1px solid rgba(184,144,42,0.15); margin-bottom: 10px;
  }
  .clock-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--blood); animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; } 50% { opacity: 0.25; }
  }
  .ch-number {
    font-family: 'Share Tech Mono', monospace; font-size: 10px;
    color: var(--brass); letter-spacing: 0.4em;
    display: block; margin-bottom: 10px;
  }
  .ch-title {
    font-family: 'Noto Serif Bengali', serif;
    font-size: clamp(30px, 5.5vw, 50px);
    font-weight: 700; color: var(--paper); line-height: 1.2;
  }

  /* ─── BODY TEXT ─────────────────────────────────────────────── */
  .chapter-body p {
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 17.5px; font-weight: 400; line-height: 2.0;
    color: #d4c9b0; margin-bottom: 22px;
    text-align: justify; hyphens: auto; letter-spacing: 0.01em;
  }

  /* Drop cap — Bengali style */
  .chapter-body p:first-child::first-letter {
    font-family: 'Noto Serif Bengali', serif;
    font-size: 68px; font-weight: 700;
    float: left; line-height: 0.78;
    margin: 10px 14px 0 0;
    color: var(--brass);
  }

  /* Dialogue lines */
  .chapter-body p.dlg {
    padding-left: 20px;
    border-left: 2px solid rgba(184,144,42,0.25);
    color: #e0d6bc;
  }

  /* Aside / narrative block */
  .chapter-body p.aside {
    font-family: 'Tiro Bangla', serif;
    font-style: italic; font-size: 16px;
    color: #a89878; margin: 4px 0 18px;
    padding: 0 32px;
  }

  .divider {
    text-align: center; color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; letter-spacing: 0.5em; margin: 36px 0;
  }

  /* ─── NOTEBOOK CARD ─────────────────────────────────────────── */
  .note-card {
    background: rgba(184,144,42,0.04);
    border: 1px solid rgba(184,144,42,0.2);
    border-left: 3px solid var(--brass);
    padding: 20px 26px; margin: 32px 0; position: relative;
  }
  .note-card::before {
    content: '// প্রাণিধির নোট';
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px; color: var(--brass);
    letter-spacing: 0.3em; display: block;
    margin-bottom: 14px; opacity: 0.7;
  }
  .note-card p {
    font-family: 'Hind Siliguri', sans-serif !important;
    font-size: 13.5px !important; font-weight: 400 !important;
    color: var(--dim) !important; line-height: 1.85 !important;
    margin-bottom: 8px !important; text-align: left !important;
  }
  .note-card p:first-child::first-letter {
    font-size: 13.5px !important; float: none !important;
    line-height: inherit !important; margin: 0 !important;
    color: var(--dim) !important;
  }

  /* ─── SUSPECT DOSSIER ───────────────────────────────────────── */
  .suspect-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 16px; margin: 32px 0;
  }
  .suspect-card {
    background: #0d0b08; border: 1px solid rgba(184,144,42,0.15);
    padding: 20px; position: relative; transition: border-color 0.2s;
  }
  .suspect-card:hover { border-color: rgba(184,144,42,0.4); }
  .suspect-card.arrested { border-color: var(--blood); }
  .suspect-card.arrested::after {
    content: 'গ্রেপ্তার';
    position: absolute; top: 8px; right: 8px;
    font-family: 'Noto Serif Bengali', serif;
    font-size: 9px; color: var(--blood); letter-spacing: 0.1em;
    border: 1px solid var(--blood); padding: 2px 6px;
  }
  .suspect-name {
    font-family: 'Noto Serif Bengali', serif;
    font-size: 15px; color: var(--paper); margin-bottom: 4px;
  }
  .suspect-role {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px; color: var(--brass);
    letter-spacing: 0.2em; margin-bottom: 10px;
  }
  .suspect-detail {
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 12px; color: var(--dim); line-height: 1.7;
  }

  /* ─── BOTTOM NAV ────────────────────────────────────────────── */
  #bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; height: 72px;
    background: rgba(13,11,8,0.97);
    border-top: 1px solid rgba(184,144,42,0.15);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px; z-index: 40;
  }
  .nav-btn {
    background: none; border: 1px solid rgba(184,144,42,0.3);
    color: var(--dim); font-family: 'Noto Serif Bengali', serif;
    font-size: 12px; letter-spacing: 0.1em;
    padding: 10px 24px; cursor: pointer; transition: all 0.2s;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--brass); color: var(--brass); }
  .nav-btn:disabled { opacity: 0.2; cursor: not-allowed; }

  .chapter-counter {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; color: var(--dim); text-align: center;
  }
  .chapter-counter span { color: var(--brass); font-size: 18px; display: block; margin-bottom: 2px; }

  /* ─── OVERLAY ───────────────────────────────────────────────── */
  #overlay {
    display: none; position: fixed; inset: 0; z-index: 45;
    background: rgba(0,0,0,0.5);
  }
  #overlay.visible { display: block; }

  /* ─── SCAN LINES ────────────────────────────────────────────── */
  #content-area::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,0,0,0.025) 3px, rgba(0,0,0,0.025) 4px
    );
    pointer-events: none; z-index: 200;
  }

  /* ─── SCROLLBAR ─────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0d0b08; }
  ::-webkit-scrollbar-thumb { background: rgba(184,144,42,0.3); }
  ::-webkit-scrollbar-thumb:hover { background: var(--brass); }

  #reader { display: none; min-height: 100vh; }
  #reader.visible { display: flex; }

  @media (max-width: 600px) {
    .chapter-page { padding: 36px 18px 110px; }
    .chapter-body p { font-size: 16px; }
    .chapter-body p.aside { padding: 0 12px; }
  }
</style>
</head>
<body>

<!-- TITLE SCREEN -->
<div id="title-screen">
  <div class="title-bg"></div>
  <div class="title-emblem">কাবুল · আগস্ট ২০২১ · গোপন</div>
  <h1 class="title-main">দূতাবাসের<br>এক ঘণ্টা</h1>
  <div class="title-en">THE EMBASSY HOUR</div>
  <div class="title-sub">একটি গোয়েন্দা উপন্যাস</div>
  <div class="title-author">ফ্র্যাকচার্ড সিনিসিজম রচিত</div>
  <div class="title-divider"></div>
  <p class="title-context">একজন নিখোঁজ সাংবাদিক। একটি দূতাবাস।<br>আটচল্লিশ ঘণ্টা বাকি এক শহরের।</p>
  <button class="start-btn" onclick="startReading()">পড়া শুরু করুন</button>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sidebar-title">অধ্যায়সমূহ</div>
  <div id="chapter-list"></div>
</div>
<div id="overlay" onclick="toggleSidebar()"></div>

<!-- READER -->
<div id="reader">
  <div id="topbar">
    <button id="menu-btn" onclick="toggleSidebar()">
      <span></span><span></span><span></span>
    </button>
    <div class="topbar-title">দূতাবাসের এক ঘণ্টা</div>
    <div class="topbar-chapter" id="topbar-chapter-label">অধ্যায় এক</div>
  </div>
  <div id="progress-bar"><div id="progress-fill"></div></div>

  <div id="content-area"></div>

  <div id="bottom-nav">
    <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">← পূর্ববর্তী</button>
    <div class="chapter-counter">
      <span id="ch-current">১</span>
      <div>/ ১২</div>
    </div>
    <button class="nav-btn" id="next-btn" onclick="navigate(1)">পরবর্তী →</button>
  </div>
</div>

<script>
// Bengali numerals helper
function toBengaliNum(n) {
  return String(n).replace(/[0-9]/g, d => '০১২৩৪৫৬৭৮৯'[d]);
}

const chapters = [
  {
    num: 1,
    numBn: 'এক',
    title: 'গাঁদাফুল',
    time: '০২:৪৭ · কাবুল',
    body: [
      { t: 'রাত তখন ২টো বেজে ৪৭ মিনিট। ফোনটা বাজল।' },
      { t: 'কাবুল নিস্তব্ধ। কিন্তু এ নিস্তব্ধতা স্বাভাবিক নয়। এ এক অদ্ভুত, ভারী নীরবতা — যেন শহরটা নিজেই জানে কী আসছে। তিন দিন আগে শেষ আমেরিকান কনভয় হাইওয়ে ওয়ানের ওপর দিয়ে দক্ষিণে মিলিয়ে গেছে, আর ফেরেনি। চেকপোস্টগুলো ফাঁকা। আফগান সেনাবাহিনী পিছু হটছে না, আত্মসমর্পণও করছে না — শুধু উবে গেছে। যেভাবে লবণ জলে মিশে যায় — কোনো শব্দ নেই, কোনো চিহ্ন নেই, শুধু একটা শূন্যতা থাকে যেখানে একসময় কিছু একটা ছিল।' },
      { t: 'গোয়েন্দা উত্তম প্রাণিধি অন্ধকারে ফোনটা তুলে নিলেন।' },
      { t: 'বাইরে, শহরের কোথাও, একটা কুকুর একবার ডেকে থামল। আর কেউ সাড়া দিল না।' },
      { t: 'লাইনের ওপ্রান্তে মহিলাটি পশতু আর পাঞ্জাবি মিশিয়ে কথা বলছিলেন — যেভাবে মানুষ কথা বলে যখন কান্না আটকাতে গিয়ে ভাষা বারবার বদলে ফেলে।' },
      { t: '\"আমার স্বামী এই নম্বরটা দিয়েছিলেন। বলেছিলেন, মধ্যরাতের মধ্যে ফোন না করলে আমি যেন করি।\"', type: 'dlg' },

let currentChapter = 0;

function startReading() {
  const ts = document.getElementById('title-screen');
  ts.classList.add('fade-out');
  setTimeout(() => {
    ts.style.display = 'none';
    document.getElementById('reader').style.display = 'flex';
    buildChapters();
    buildSidebar();
    showChapter(0);
  }, 1400);
}

function buildParagraphs(bodyArr) {
  return bodyArr.map(item => {
    const cls = item.type === 'dlg' ? ' dlg' : item.type === 'aside' ? ' aside' : '';
    return `<p class="${cls.trim()}">${item.t}</p>`;
  }).join('');
}

function buildChapters() {
  const area = document.getElementById('content-area');
  chapters.forEach((ch, i) => {
    const div = document.createElement('div');
    div.className = 'chapter-page' + (i === 0 ? ' active' : '');
    div.id = `ch-${i}`;

    const bodyHTML = buildParagraphs(ch.body);

    let noteHTML = '';
    if (ch.note && ch.noteContent) {
      noteHTML = `<div class="note-card">${ch.noteContent.map(n => `<p>${n}</p>`).join('')}</div>`;
    }

    let suspectsHTML = '';
    if (ch.suspects) {
      suspectsHTML = `
        <div style="margin:44px 0 0;border-top:1px solid rgba(184,144,42,0.2);padding-top:32px;">
          <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--brass);letter-spacing:0.4em;margin-bottom:20px;">মামলার সমাধান · প্রধান পক্ষ</div>
          <div class="suspect-grid">
            ${ch.suspects.map(s => `
              <div class="suspect-card ${s.status === 'arrested' ? 'arrested' : ''}">
                <div class="suspect-name">${s.name}</div>
                <div class="suspect-role">${s.role}</div>
                <div class="suspect-detail">${s.detail}</div>
              </div>
            `).join('')}
          </div>
        </div>`;
    }

    div.innerHTML = `
      <div class="chapter-header">
        <div class="kabul-clock"><div class="clock-dot"></div>${ch.time}</div>
        <span class="ch-number">অধ্যায় ${ch.numBn.toUpperCase()}</span>
        <h2 class="ch-title">${ch.title}</h2>
      </div>
      <div class="chapter-body">
        ${bodyHTML}
        ${noteHTML}
        ${suspectsHTML}
      </div>`;
    area.appendChild(div);
  });
}

function buildSidebar() {
  const list = document.getElementById('chapter-list');
  chapters.forEach((ch, i) => {
    const item = document.createElement('div');
    item.className = 'chapter-nav-item' + (i === 0 ? ' active' : '');
    item.id = `nav-${i}`;
    item.innerHTML = `<span class="chapter-num">অধ্যায় ${ch.numBn.toUpperCase()}</span>${ch.title}`;
    item.onclick = () => { showChapter(i); toggleSidebar(); };
    list.appendChild(item);
  });
}

function showChapter(idx) {
  document.querySelectorAll('.chapter-page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.chapter-nav-item').forEach(n => n.classList.remove('active'));
  const page = document.getElementById(`ch-${idx}`);
  if (page) { page.classList.add('active'); window.scrollTo(0,0); }
  const nav = document.getElementById(`nav-${idx}`);
  if (nav) nav.classList.add('active');
  currentChapter = idx;
  document.getElementById('topbar-chapter-label').textContent = chapters[idx].title;
  document.getElementById('ch-current').textContent = toBengaliNum(idx + 1);
  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-btn').disabled = idx === chapters.length - 1;
  document.getElementById('progress-fill').style.width = ((idx+1)/chapters.length*100) + '%';
}

function navigate(dir) {
  const next = currentChapter + dir;
  if (next >= 0 && next < chapters.length) showChapter(next);
}

let sidebarOpen = false;
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('open', sidebarOpen);
  document.getElementById('overlay').classList.toggle('visible', sidebarOpen);
  document.getElementById('menu-btn').classList.toggle('open', sidebarOpen);
}
</script>
